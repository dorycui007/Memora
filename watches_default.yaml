# Memora Watch Targets — URLs to monitor for changes
# Copy to ~/.memora/watches.yaml and customize
#
# Each watch target has:
#   name: Human-readable identifier
#   url: URL to monitor
#   interval_hours: How often to check (12-168)
#   alert_on: List of change types to alert on
#   network: Which Memora network this belongs to

watches: []

