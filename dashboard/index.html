<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memora — Strategic Intelligence</title>
    <link rel="stylesheet" href="/css/gotham.css">
    <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
    <script src="https://unpkg.com/vis-timeline@7.7.3/standalone/umd/vis-timeline-graph2d.min.js"></script>
    <link href="https://unpkg.com/vis-timeline@7.7.3/styles/vis-timeline-graph2d.min.css" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div id="app">
        <nav id="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">MEMORA</h1>
                <span class="version">v2.0</span>
            </div>
            <ul class="nav-links">
                <li><a href="#graph" class="nav-link active" data-view="graph">
                    <span class="nav-icon">&#9678;</span> Intelligence Graph
                </a></li>
                <li><a href="#positions" class="nav-link" data-view="positions">
                    <span class="nav-icon">&#9733;</span> Positions
                </a></li>
                <li><a href="#briefing" class="nav-link" data-view="briefing">
                    <span class="nav-icon">&#9993;</span> Briefing
                </a></li>
                <li><a href="#timeline" class="nav-link" data-view="timeline">
                    <span class="nav-icon">&#8594;</span> Timeline
                </a></li>
                <li><a href="#people" class="nav-link" data-view="people">
                    <span class="nav-icon">&#9787;</span> People
                </a></li>
                <li><a href="#academic" class="nav-link" data-view="academic">
                    <span class="nav-icon">&#9734;</span> Academic
                </a></li>
            </ul>
            <div class="sidebar-footer">
                <div id="search-container">
                    <input type="text" id="global-search" placeholder="Search entities...">
                </div>
                <div id="connection-status" class="status-indicator">
                    <span class="status-dot"></span> Connecting...
                </div>
            </div>
        </nav>

        <main id="main-content">
            <div id="view-graph" class="view active"></div>
            <div id="view-positions" class="view"></div>
            <div id="view-briefing" class="view"></div>
            <div id="view-timeline" class="view"></div>
            <div id="view-people" class="view"></div>
            <div id="view-academic" class="view"></div>
        </main>

        <!-- Cursor-following tooltip for graph hover -->
        <div id="graph-tooltip">
            <div class="tt-label" id="tt-label"></div>
            <div id="tt-body"></div>
        </div>

        <!-- Glassmorphic node detail modal -->
        <div id="modal-backdrop">
            <div id="modal-card">
                <button id="modal-close">&times;</button>
                <div id="modal-category"></div>
                <h2 id="modal-title"></h2>
                <div id="modal-networks"></div>
                <div id="modal-body"></div>
                <div id="modal-connections">
                    <h4>Connected To</h4>
                    <div id="modal-conn-list"></div>
                </div>
            </div>
        </div>

        <!-- Investigation Panel (slide-in overlay, used by non-graph views) -->
        <aside id="investigation-panel" class="panel hidden">
            <div class="panel-header">
                <h2 id="panel-title">Investigation</h2>
                <button id="panel-close" class="btn-close">&times;</button>
            </div>
            <div id="panel-content"></div>
        </aside>

        <div id="toast-container"></div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/components/notification.js"></script>
    <script src="/js/components/search-bar.js"></script>
    <script src="/js/components/entity-card.js"></script>
    <script src="/js/components/metric-chart.js"></script>
    <script src="/js/views/graph.js"></script>
    <script src="/js/views/positions.js"></script>
    <script src="/js/views/briefing.js"></script>
    <script src="/js/views/timeline.js"></script>
    <script src="/js/views/people.js"></script>
    <script src="/js/views/academic.js"></script>
    <script src="/js/views/investigate.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
